name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Get source
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: aiCheating-main
        run: npm install

      - name: Build
        working-directory: aiCheating-main
        run: npm run build

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: aiCheating-build
          path: |
            aiCheating-main/dist/**
            aiCheating-main/release/**
