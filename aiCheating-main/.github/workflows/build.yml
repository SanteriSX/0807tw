name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: aiCheating-main
        run: npm install

      - name: Build
        working-directory: aiCheating-main
        run: npm run build

      - name: Upload Installer
        uses: actions/upload-artifact@v5
        with:
          name: AiCheating-Windows
          path: |
            aiCheating-main/release/**
